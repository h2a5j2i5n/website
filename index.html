<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>송순희 여사의 가족</title>
    <meta
      name="description"
      content="송순희 여사의 가족을 환영하고, 팔순잔치와 결혼식 같은 가족 축하 사진을 모아보는 가족 앨범 홈페이지입니다."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="top">
      <aside class="family-sidebar" aria-label="가족 카테고리">
        <button class="family-tab active" type="button" data-family="all">
          전체 가족
        </button>
        <button class="family-tab" type="button" data-family="song-soonhee">
          송순희 여사
        </button>
        <button class="family-tab" type="button" data-family="jeon-aram">
          전아람 가족
        </button>
        <button class="family-tab" type="button" data-family="jeon-gyeongae">
          전경애 가족
        </button>
        <button class="family-tab" type="button" data-family="jeon-sinae">
          전신애 가족
        </button>
      </aside>

      <section class="hero" aria-label="송순희 여사의 가족 환영">
        <img
          class="hero-image"
          id="heroImage"
          src="./assets/palsoon-hero-small.jpg"
          alt="가족 축하 자리를 떠올리게 하는 꽃 장식과 생신상"
        />
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1 id="heroTitle">송순희 여사의 가족 환영합니다</h1>
          <p class="hero-copy">
            가족들의 소중한 시간들과 마음을 함께 모아두는 가족 홈페이지입니다.
          </p>
        </div>
      </section>

      <section class="section-inner album-section" id="album">
        <div class="section-heading">
          <h2>가족 축하 앨범</h2>
          <p>
            전체 가족에서는 공감과 댓글이 많은 사진이 먼저 보입니다. 각 가족
            앨범에서는 새로 올린 사진부터 편하게 볼 수 있습니다.
          </p>
        </div>

        <div class="album-grid" id="albumGrid" aria-live="polite"></div>

        <details class="add-panel album-add" id="addPhoto" open>
          <summary>
            <span>앨범 사진 추가</span>
            <span class="plus-mark">+</span>
          </summary>
          <form class="album-form" id="albumForm">
            <label>
              가족
              <select id="photoFamily">
                <option value="song-soonhee">송순희 여사</option>
                <option value="jeon-aram">전아람 가족</option>
                <option value="jeon-gyeongae">전경애 가족</option>
                <option value="jeon-sinae">전신애 가족</option>
              </select>
            </label>
            <label>
              제목
              <input id="photoTitle" type="text" />
            </label>
            <label>
              날짜
              <input id="photoDate" type="date" />
            </label>
            <label>
              분류
              <span class="category-control">
                <select id="photoCategory">
                  <option value="palsoon">송순희 여사 팔순잔치</option>
                  <option value="wedding">결혼식</option>
                  <option value="birthday">생신/기념일</option>
                  <option value="family">가족 모임</option>
                  <option value="trip">여행</option>
                  <option value="other">기타</option>
                </select>
                <input
                  id="customCategory"
                  class="same-field-input"
                  type="text"
                  value="분류명을 직접 입력해 주세요."
                  hidden
                />
              </span>
            </label>
            <label>
              사진
              <input
                id="photoFile"
                class="file-input"
                type="file"
                accept="image/*,.heic,.heif"
              />
            </label>
            <p class="upload-status wide" id="uploadStatus" aria-live="polite"></p>
            <label class="wide">
              설명
              <textarea
                id="photoMemo"
                rows="3"
                placeholder="사진에 담긴 사람, 장소, 기억하고 싶은 말을 적어 주세요."
              ></textarea>
            </label>
            <button class="button primary wide" id="albumSubmitButton" type="submit">
              앨범에 추가
            </button>
          </form>
        </details>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
